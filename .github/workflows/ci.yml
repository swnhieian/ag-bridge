name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Type-check extension
        run: npm run check

      - name: Build extension and Node CLI
        run: npm run build

      - name: Package VSIX
        run: npm run package:vsix

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: python -m pip install -e python

      - name: Smoke-test Python CLI
        run: python -m ag_bridge_client --help
