name: Release Open VSX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches extension version
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "workflow_dispatch run: skip tag/version validation"
            exit 0
          fi
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Build and package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ag-bridge-vsix
          path: ag-bridge-*.vsix

      - name: Publish to Open VSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish "./ag-bridge-$(node -p "require('./package.json').version").vsix" -p "$OVSX_TOKEN"
